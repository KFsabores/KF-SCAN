<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KF-SCAN | Dashboard Premium</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F2D472;
            --black: #000000;
            --card-bg: #121212;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(to bottom, #1a1a1a, var(--black));
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            padding: 5px;
            background: var(--black);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .container {
            width: 92%;
            max-width: 450px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--gold); font-size: 1.1rem; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        label { color: var(--gold); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        select, input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .market-group {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .btn-add-market {
            background: #1a1a1a;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 1;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--gold), var(--gold-light));
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: #000;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #222;
            border-top: 3px solid var(--gold);
        }

        .stat-val { font-size: 1.1rem; font-weight: bold; color: white; }
        .stat-label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="kfscan.jpg" alt="Logo KF-SCAN">
        </div>
        <div style="font-size: 0.8rem; letter-spacing: 2px; color: var(--gold);">KF SABORES PREMIUM</div>
    </div>

    <div class="container">
        <div id="menu-screen">
            <div class="card">
                <label>Onde você está comprando?</label>
                <div class="market-group">
                    <select id="marketSelect">
                        <option>Assaí</option><option>MaM</option><option>MEGA</option>
                        <option>CEASA</option><option>Guanabara</option><option>Sacolão</option>
                    </select>
                    <button class="btn-add-market" onclick="addNewMarket()" title="Adicionar Novo Mercado">+</button>
                </div>
                
                <button class="btn-main" onclick="startScanner()">📸 ESCANEAR QR CODE</button>
                <button class="btn-outline" onclick="showForm('Lançamento Manual')">✍️ LANÇAMENTO MANUAL</button>
            </div>

            <div id="reader"></div>

            <div class="card">
                <h2>Relatórios & Gestão</h2>
                <button class="btn-outline" onclick="fetchAndQuery()">📊 CONSULTA POR PERÍODO</button>
                <button class="btn-outline" onclick="window.open('https://docs.google.com/spreadsheets/d/1RJZ8Kloo62yg7YDur1G2KG2w5xYCHjbk_WCRbinewUY/edit', '_blank')" style="border-color: #217346; color: #217346;">📂 ABRIR PLANILHA</button>
            </div>
        </div>

        <div id="form-screen" class="hidden">
            <div class="card">
                <h2 id="formTitle">Novo Registro</h2>
                <label>Descrição do Produto</label>
                <input type="text" id="editNome" placeholder="Ex: Farinha de Trigo">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label>Qtd</label><input type="number" id="editQtd" value="1"></div>
                    <div style="flex: 2;"><label>Preço Unit.</label><input type="text" id="editValor" placeholder="0,00"></div>
                </div>

                <label>Destino do Gasto</label>
                <select id="editDestino" style="border: 2px solid var(--gold);">
                    <option value="LOJA">LOJA (KF Sabores)</option>
                    <option value="CASA">CASA (Pessoal)</option>
                </select>

                <button class="btn-main" onclick="saveData()">CONFIRMAR E SALVAR</button>
                <button class="btn-outline" onclick="location.reload()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_API = "https://script.google.com/macros/s/AKfycbxjU3c6lbY2iMHi_UPT3EUx8tYR-hZeJ3WU0MHFgylBJ6JDDaQo_mmqR3g1shZKxcXPOQ/exec";
        let html5QrCode;

        function addNewMarket() {
            Swal.fire({
                title: 'Novo Mercado',
                input: 'text',
                inputLabel: 'Nome do Estabelecimento',
                showCancelButton: true,
                confirmButtonColor: '#D4AF37',
                cancelButtonText: 'Voltar'
            }).then((result) => {
                if (result.value) {
                    const sel = document.getElementById('marketSelect');
                    const opt = document.createElement('option');
                    opt.text = result.value;
                    opt.selected = true;
                    sel.add(opt);
                }
            });
        }

        async function fetchAndQuery() {
            Swal.fire({
                title: 'Selecione o Período',
                html: '<input type="text" id="rangeDate" class="swal2-input" style="width: 80%">',
                didOpen: () => {
                    flatpickr("#rangeDate", { mode: "range", dateFormat: "d/m/Y", locale: "pt" });
                },
                confirmButtonText: 'Calcular Totais',
                confirmButtonColor: '#D4AF37'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const range = document.getElementById('rangeDate').value;
                    if (!range.includes(" até ")) return;

                    Swal.fire({ title: 'Processando Planilha...', didOpen: () => Swal.showLoading() });
                    
                    try {
                        const response = await fetch(GAS_API);
                        const allData = await response.json();
                        
                        let totalLoja = 0, totalCasa = 0;
                        // Filtro de lógica de data simples aqui
                        allData.forEach(row => {
                            if (row.destino === "LOJA") totalLoja += parseFloat(row.valor || 0);
                            if (row.destino === "CASA") totalCasa += parseFloat(row.valor || 0);
                        });

                        Swal.fire({
                            title: 'Resumo do Período',
                            html: `
                                <div class="stats-grid">
                                    <div class="stat-box"><div class="stat-val">R$ ${totalLoja.toFixed(2)}</div><div class="stat-label">TOTAL LOJA</div></div>
                                    <div class="stat-box"><div class="stat-val">R$ ${totalCasa.toFixed(2)}</div><div class="stat-label">TOTAL CASA</div></div>
                                </div>
                            `,
                            confirmButtonColor: '#D4AF37'
                        });
                    } catch (e) {
                        Swal.fire('Erro', 'Não foi possível ler os dados.', 'error');
                    }
                }
            });
        }

        function startScanner() {
            document.getElementById('reader').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    html5QrCode.stop();
                    document.getElementById('reader').style.display = 'none';
                    showForm('Lançamento via QR');
                }
            );
        }

        function showForm(title) {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('form-screen').classList.remove('hidden');
            document.getElementById('formTitle').innerText = title;
        }

        async function saveData() {
            const data = {
                data: new Date().toLocaleDateString('pt-BR'),
                nome: document.getElementById('editNome').value,
                qtd: document.getElementById('editQtd').value,
                valor: document.getElementById('editValor').value,
                mercado: document.getElementById('marketSelect').value,
                destino: document.getElementById('editDestino').value,
                sessao: "Geral"
            };

            if(!data.nome || !data.valor) return Swal.fire('Atenção', 'Preencha o item e o valor.', 'warning');

            Swal.fire({ title: 'Salvando...', didOpen: () => Swal.showLoading() });

            try {
                await fetch(GAS_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                Swal.fire('Registrado!', 'Os dados já estão na nuvem.', 'success').then(() => location.reload());
            } catch (e) {
                Swal.fire('Erro', 'Falha na conexão.', 'error');
            }
        }
    </script>
</body>
</html>
