<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KF-SCAN | Dashboard Premium</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F2D472;
            --gold-dark: #996515;
            --black: #050505;
            --card-bg: rgba(30, 30, 30, 0.7);
            --text-gray: #b0b0b0;
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        body {
            background-color: var(--black);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 50px 20px 30px;
            background: linear-gradient(to bottom, rgba(15,15,15,1), transparent);
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--black);
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        h2 { 
            color: var(--gold); 
            font-size: 1rem; 
            margin-top: 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 800;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        label { 
            color: var(--gold-light); 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        select, input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 18px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .market-group {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .btn-add-market {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            color: #000;
            padding: 0 18px;
            height: 54px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .btn-add-market:active { transform: scale(0.95); }

        .btn-main {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            margin-bottom: 15px;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .btn-main:active { transform: scale(0.98); }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        #reader {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--gold);
            margin-bottom: 25px;
            display: none;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 18px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .stat-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .stat-val { font-size: 1.2rem; font-weight: 800; color: white; margin-bottom: 4px; }
        .stat-label { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        .hidden { display: none; }

        /* Customizações SweetAlert2 para Tema Escuro */
        .swal2-popup {
            background: #151515 !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 24px !important;
            color: white !important;
        }
        .swal2-title {
            color: var(--gold) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 800 !important;
        }
        .swal2-html-container {
            color: #ddd !important;
        }
        .swal2-input {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            border-radius: 12px !important;
            height: 50px !important;
            font-family: 'Outfit', sans-serif !important;
        }
        .swal2-input:focus {
            border-color: var(--gold) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2) !important;
            outline: none !important;
        }
        .swal2-confirm {
            background: var(--gold) !important;
            color: black !important;
            font-weight: 800 !important;
            border-radius: 12px !important;
            text-transform: uppercase !important;
        }
        .swal2-cancel {
            border-radius: 12px !important;
            text-transform: uppercase !important;
        }

        /* Estilo para o Dropdown do Select */
        select option {
            background: #151515;
            color: white;
            padding: 10px;
        }

        /* Ajuste para Flatpickr no tema escuro */
        .flatpickr-calendar {
            background: #151515 !important;
            border: 1px solid var(--glass-border) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
            color: white !important;
        }
        .flatpickr-day { color: white !important; }
        .flatpickr-day:hover, .flatpickr-day.prevMonthDay:hover, .flatpickr-day.nextMonthDay:hover {
            background: var(--gold-dark) !important;
            border-color: var(--gold-dark) !important;
        }
        .flatpickr-day.selected {
            background: var(--gold) !important;
            border-color: var(--gold) !important;
            color: black !important;
        }
        .flatpickr-month, .flatpickr-weekday {
            color: var(--gold) !important;
            fill: var(--gold) !important;
        }
        .flatpickr-current-month .flatpickr-monthDropdown-months {
            background: #151515 !important;
            color: white !important;
        }
        span.flatpickr-weekday { color: var(--gold-light) !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="logo_premium.png" alt="Logo KF-SCAN">
        </div>
        <div style="font-size: 0.9rem; letter-spacing: 4px; color: var(--gold); font-weight: 800; text-shadow: 0 0 10px rgba(212,175,55,0.3);">KF SABORES PREMIUM</div>
    </div>

    <div class="container">
        <div id="menu-screen">
            <div class="card">
                <label>Mercado</label>
                <div class="market-group">
                    <select id="marketSelect">
                        <!-- Mercados carregados via JS -->
                    </select>
                    <button class="btn-add-market" onclick="addNewMarket()">+</button>
                </div>
                
                <button class="btn-main" onclick="startScanner()">📸 ESCANEAR QR CODE</button>
                <button class="btn-outline" onclick="showForm('Lançamento Manual')">✍️ LANÇAMENTO MANUAL</button>
            </div>

            <div id="reader"></div>

            <div class="card">
                <h2>Relatórios & Gestão</h2>
                <button class="btn-outline" onclick="fetchAndQuery()">📊 CONSULTA POR PERÍODO</button>
                <button class="btn-outline" onclick="window.open('https://docs.google.com/spreadsheets/d/1RJZ8Kloo62yg7YDur1G2KG2w5xYCHjbk_WCRbinewUY/edit', '_blank')" style="border-color: #217346; color: #217346;">📂 ABRIR PLANILHA</button>
            </div>
        </div>

        <div id="form-screen" class="hidden">
            <div class="card">
                <h2 id="formTitle">Novo Registro</h2>
                <label>Item</label>
                <input type="text" id="editNome" placeholder="O que você comprou?">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label>Qtd</label><input type="number" id="editQtd" value="1"></div>
                    <div style="flex: 2;"><label>Preço Unit.</label><input type="text" id="editValor" placeholder="0,00"></div>
                </div>

                <label>Destino do Gasto</label>
                <select id="editDestino" style="border: 2px solid var(--gold);">
                    <option value="LOJA">LOJA (KF Sabores)</option>
                    <option value="CASA">CASA (Pessoal)</option>
                </select>

                <button class="btn-main" onclick="saveData()">SALVAR NA PLANILHA</button>
                <button class="btn-outline" onclick="location.reload()">VOLTAR</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_API = "https://script.google.com/macros/s/AKfycbwRw_jg7Nz5tLyOaj-G5MNbAZJ6YOX4WUlIKSkWdgXMF61KdeVUPL5EiYNf4cNs7TId-g/exec";
        let html5QrCode;

        // Lista padrão de mercados
        const DEFAULT_MARKETS = ["Assaí", "MaM", "MEGA", "CEASA", "Guanabara", "Sacolão"];

        // Carrega mercados ao iniciar
        document.addEventListener('DOMContentLoaded', renderMarkets);

        function renderMarkets() {
            const sel = document.getElementById('marketSelect');
            const savedMarkets = JSON.parse(localStorage.getItem('kf_markets')) || DEFAULT_MARKETS;
            
            sel.innerHTML = '';
            savedMarkets.forEach(m => {
                const opt = document.createElement('option');
                opt.text = m;
                opt.value = m;
                sel.add(opt);
            });
        }

        function addNewMarket() {
            Swal.fire({
                title: 'Novo Mercado',
                input: 'text',
                inputPlaceholder: 'Nome do mercado',
                confirmButtonColor: '#D4AF37',
                confirmButtonText: 'Adicionar',
                showCancelButton: true,
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.value) {
                    const newMarket = result.value.trim();
                    if (newMarket) {
                        let savedMarkets = JSON.parse(localStorage.getItem('kf_markets')) || DEFAULT_MARKETS;
                        if (!savedMarkets.includes(newMarket)) {
                            savedMarkets.push(newMarket);
                            localStorage.setItem('kf_markets', JSON.stringify(savedMarkets));
                            renderMarkets();
                            document.getElementById('marketSelect').value = newMarket;
                            Swal.fire('Sucesso', 'Mercado adicionado!', 'success');
                        } else {
                            Swal.fire('Aviso', 'Mercado já existe.', 'info');
                        }
                    }
                }
            });
        }

        async function fetchAndQuery() {
            Swal.fire({
                title: 'Selecione o Período',
                html: '<input type="text" id="rangeDate" class="swal2-input" style="width: 80%">',
                didOpen: () => {
                    flatpickr("#rangeDate", { mode: "range", dateFormat: "d/m/Y", locale: "pt" });
                },
                confirmButtonText: 'Consultar',
                confirmButtonColor: '#D4AF37'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Buscando dados...', didOpen: () => Swal.showLoading() });
                    try {
                        const response = await fetch(GAS_API);
                        const allData = await response.json();
                        
                        let totalLoja = 0, totalCasa = 0;
                        allData.forEach(row => {
                            let v = parseFloat(row.valor) || 0;
                            if (row.destino === "LOJA") totalLoja += v;
                            else if (row.destino === "CASA") totalCasa += v;
                        });

                        Swal.fire({
                            title: 'Resumo Financeiro',
                            html: `
                                <div class="stats-grid">
                                    <div class="stat-box"><div class="stat-val">R$ ${totalLoja.toFixed(2)}</div><div class="stat-label">LOJA</div></div>
                                    <div class="stat-box"><div class="stat-val">R$ ${totalCasa.toFixed(2)}</div><div class="stat-label">CASA</div></div>
                                </div>
                            `,
                            confirmButtonColor: '#D4AF37'
                        });
                    } catch (e) {
                        Swal.fire('Erro', 'Não foi possível ler a planilha.', 'error');
                    }
                }
            });
        }

        function startScanner() {
            document.getElementById('reader').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    html5QrCode.stop();
                    document.getElementById('reader').style.display = 'none';
                    showForm('Via QR Code');
                }
            ).catch(err => Swal.fire('Erro', 'Câmera não autorizada.', 'error'));
        }

        function showForm(title) {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('form-screen').classList.remove('hidden');
            document.getElementById('formTitle').innerText = title;
        }

        async function saveData() {
            const nome = document.getElementById('editNome').value.trim();
            const valorRaw = document.getElementById('editValor').value.trim();
            const qtd = document.getElementById('editQtd').value;
            const mercado = document.getElementById('marketSelect').value;
            const destino = document.getElementById('editDestino').value;

            if(!nome || !valorRaw) {
                return Swal.fire('Atenção', 'Nome e Valor são obrigatórios', 'warning');
            }

            const data = {
                data: new Date().toLocaleDateString('pt-BR'),
                nome: nome,
                qtd: qtd,
                valor: valorRaw,
                mercado: mercado,
                destino: destino
            };

            Swal.fire({ 
                title: 'Enviando...', 
                text: 'Sincronizando com a planilha',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading() 
            });

            try {
                // Simplificamos o envio para garantir compatibilidade máxima com o Google
                await fetch(GAS_API, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(data) 
                });
                
                Swal.fire({
                    title: 'Sucesso!',
                    text: 'Dados enviados para a planilha.',
                    icon: 'success',
                    confirmButtonColor: '#D4AF37'
                }).then(() => location.reload());

            } catch (e) {
                console.error('Erro no salvamento:', e);
                Swal.fire('Erro', 'Falha ao conectar com o servidor. Verifique sua internet.', 'error');
            }
        }
    </script>
</body>
</html>
